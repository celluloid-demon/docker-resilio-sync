services:
  resilio-sync:
    image: lscr.io/linuxserver/resilio-sync:${TAG:-3.1.2}
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - ${VOLUMES}/config:/config
      - ${VOLUMES}/downloads:/downloads
      - ${VOLUMES}/data:/sync
    ports:
      - ${WEB_PORT:-8888}:8888
      - ${PEER_PORT:-55555}:55555
    restart: unless-stopped
